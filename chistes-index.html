<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Chistes Aleatorio</title>
    <link rel="stylesheet" href="chistes-style.css">
</head>
<body>
    <div class="contenedor">
        <h1>😂 Generador de Chistes Aleatorio</h1>
        <div class="caja-chiste">
            <p id="textoChiste">¡Presiona el botón para obtener un chiste!</p>
        </div>
        <button id="botonChiste" class="boton">Obtener Chiste Aleatorio</button>
        <button id="botonCopiar" class="boton boton-secundario">Copiar Chiste</button>
        <p id="textoDescarga" class="cargando" style="display: none;">Cargando chiste...</p>
    </div>
    <script src="chistes-script.js"></script>
</body>
</html>
